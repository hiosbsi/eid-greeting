<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معايدة عيد الفطر المبارك</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* لترتيب العناصر عمودياً */
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 400px;
            width: 85%;
            z-index: 10;
            margin-bottom: 20px; /* مسافة عن التوقيع */
        }
        input {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #fdbb2d;
            width: 85%;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        button {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            background: #fdbb2d;
            color: #1a2a6c;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); background: #fff; }
        .hidden { display: none; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fdbb2d; }
        #guestName { font-size: 2rem; color: #fff; margin-top: 5px; margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.6; }

        /* التوقيع المعدل ليظهر في كل الشاشات */
        .signature {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            display: block;
        }
        .signature span {
            color: #fdbb2d;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(253, 187, 45, 0.4);
        }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h2>✨ عساكم من عواده ✨</h2>
        <p>اكتب اسمك العزيز هنا:</p>
        <input type="text" id="nameInput" placeholder="مثلاً: علي حسين">
        <br>
        <button onclick="showGreeting()">إظهار المعايدة 🌙</button>
        <div class="signature">تمت البرمجة بواسطة <span>سمسم</span></div>
    </div>

    <div class="card hidden" id="greetingCard">
        <h1>عيد مبارك!</h1>
        <div id="guestName"></div>
        <p>كل عام وأنت بألف خير وصحة وسلامة.<br>تقبل الله طاعاتكم وأسعد أيامكم.</p>
        <button onclick="location.reload()">إرسال لشخص آخر 🔄</button>
        <div class="signature">تمت البرمجة بواسطة <span>سمسم</span></div>
    </div>

    <script>
        function showGreeting() {
            const name = document.getElementById('nameInput').value;
            
            if (name.trim() === "") {
                alert("حبيبي اكتب اسمك أولاً! 😊");
                return;
            }

            document.getElementById('inputCard').classList.add('hidden');
            document.getElementById('greetingCard').classList.remove('hidden');
            document.getElementById('guestName').innerText = name;

            // إطلاق الألعاب النارية
            var duration = 6 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
